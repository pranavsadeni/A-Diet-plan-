<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Diet Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c09;
    --card: #1a1712;
    --card2: #221f1a;
    --accent: #e8a838;
    --accent2: #d47c2a;
    --text: #f0e8d8;
    --muted: #8a7d68;
    --green: #5a9a4a;
    --red: #c0392b;
    --blue: #3498db;
    --border: #2e2a22;
    --accent-glow: rgba(232,168,56,0.08);
    --header-glow: rgba(232,168,56,0.12);
    --hover-card: #2a2520;
    --text-secondary: #c8b898;
    --text-tertiary: #a09070;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.35s ease, color 0.35s ease;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  .header {
    background: linear-gradient(135deg, #1a1209 0%, #2a1f0e 50%, #1a1209 100%);
    border-bottom: 2px solid var(--accent);
    padding: 32px 20px 22px;
    text-align: center;
    position: relative;
    overflow: visible;
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--header-glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--accent);
    letter-spacing: 1px;
    position: relative;
    transition: color 0.35s ease;
  }
  .header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 6px;
    position: relative;
  }

  /* ── THEME BAR ───────────────────────────────────────── */
  .theme-bar {
    position: absolute;
    top: 14px;
    right: 16px;
    display: flex;
    align-items: center;
    gap: 0;
    z-index: 100;
    background: rgba(0,0,0,0.40);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 28px;
    padding: 7px 11px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    max-width: 42px;
    overflow: hidden;
    white-space: nowrap;
    transition:
      max-width 0.45s cubic-bezier(0.4,0,0.2,1),
      gap 0.45s cubic-bezier(0.4,0,0.2,1),
      padding 0.45s cubic-bezier(0.4,0,0.2,1),
      background 0.3s ease,
      border-color 0.3s ease,
      box-shadow 0.3s ease;
  }
  .theme-bar:hover {
    max-width: 310px;
    gap: 8px;
    padding: 7px 16px 7px 13px;
    background: rgba(0,0,0,0.55);
    border-color: rgba(255,255,255,0.22);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .theme-icon {
    font-size: 0.92rem;
    flex-shrink: 0;
    line-height: 1;
  }
  .theme-label {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    opacity: 0;
    max-width: 0;
    overflow: hidden;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    transition: opacity 0.25s ease 0.1s, max-width 0.35s ease;
  }
  .theme-bar:hover .theme-label {
    opacity: 1;
    max-width: 80px;
  }
  .theme-swatches {
    display: flex;
    gap: 0;
    opacity: 0;
    flex-shrink: 0;
    transition: opacity 0.25s ease 0.08s, gap 0.35s ease;
  }
  .theme-bar:hover .theme-swatches {
    opacity: 1;
    gap: 8px;
  }
  .theme-swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.18);
    cursor: pointer;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    flex-shrink: 0;
    padding: 0;
    outline: none;
    background-size: cover;
  }
  .theme-swatch:hover {
    transform: scale(1.35);
    border-color: rgba(255,255,255,0.8);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .theme-swatch.active-theme {
    border-color: #fff;
    box-shadow: 0 0 0 3px rgba(255,255,255,0.25), 0 2px 6px rgba(0,0,0,0.4);
    transform: scale(1.15);
  }
  .swatch-amber     { background: linear-gradient(135deg, #e8a838 0%, #d47c2a 100%); }
  .swatch-dark      { background: linear-gradient(135deg, #a78bfa 0%, #060610 100%); }
  .swatch-white     { background: linear-gradient(135deg, #ffffff 0%, #dde8ff 100%); border-color: rgba(0,0,0,0.18) !important; }
  .swatch-bluepurple{ background: linear-gradient(135deg, #818cf8 0%, #070920 100%); }
  .swatch-orange    { background: linear-gradient(135deg, #fb923c 0%, #120808 100%); }
  .swatch-bluemix   { background: linear-gradient(135deg, #4f46e5 0%, #c7d2fe 100%); }

  /* ── STATS BAR ──────────────────────────────────────── */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.82rem;
    font-weight: 500;
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-cal { background: var(--accent); }
  .dot-pro { background: var(--green); }
  .dot-car { background: var(--blue); }
  .dot-fat { background: #e67e22; }

  /* ── TABS ────────────────────────────────────────────── */
  .tabs-wrap {
    display: flex;
    gap: 0;
    overflow-x: auto;
    background: var(--card);
    border-bottom: 2px solid var(--border);
    padding: 0 10px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 14px 16px;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .tab-btn:hover { color: var(--accent); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ── SECTION TOGGLE ─────────────────────────────────── */
  .section-toggle {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .toggle-btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .toggle-btn:hover { color: var(--accent); border-color: var(--accent); }
  .toggle-btn.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  /* ── MAIN CONTENT ───────────────────────────────────── */
  .main { max-width: 900px; margin: 0 auto; padding: 16px; }

  .section { display: none; animation: fadeIn 0.3s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── MEAL CARD ──────────────────────────────────────── */
  .meal-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .meal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: var(--card2);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    gap: 10px;
    transition: background 0.18s ease, border-color 0.35s ease;
  }
  .meal-header:hover { background: var(--hover-card); }
  .meal-badge {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-glow);
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
    transition: color 0.35s ease, background 0.35s ease;
  }
  .meal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--text);
    flex: 1;
    transition: color 0.35s ease;
  }
  .meal-cals {
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .chevron {
    font-size: 0.75rem;
    color: var(--muted);
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }
  .meal-card.open .chevron { transform: rotate(180deg); }
  .meal-body { display: none; padding: 18px; }
  .meal-card.open .meal-body { display: block; }

  .dish-desc {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.65;
    margin-bottom: 14px;
    font-style: italic;
  }

  .how-to-make {
    background: var(--accent-glow);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin-bottom: 14px;
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .how-to-make h4 {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
    transition: color 0.35s ease;
  }
  .how-to-make ol {
    padding-left: 18px;
    font-size: 0.85rem;
    line-height: 1.85;
    color: var(--text-secondary);
  }

  /* ── MACROS ROW ─────────────────────────────────────── */
  .macros-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .macro-box {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .macro-box .val {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .macro-box .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .cal-val { color: var(--accent); }
  .pro-val { color: var(--green); }
  .car-val { color: var(--blue); }
  .fat-val { color: #e67e22; }

  /* ── YOUTUBE LINK ───────────────────────────────────── */
  .youtube-link {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    padding: 12px 16px;
    background: rgba(255, 48, 48, 0.07);
    border: 1px solid rgba(255, 48, 48, 0.22);
    border-radius: 9px;
    color: #ff5252;
    text-decoration: none;
    font-size: 0.84rem;
    font-weight: 600;
    transition: background 0.18s ease, border-color 0.18s ease, color 0.18s ease, transform 0.18s ease;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.2px;
  }
  .youtube-link:hover {
    background: rgba(255, 48, 48, 0.14);
    border-color: rgba(255, 48, 48, 0.4);
    color: #ff6b6b;
    transform: translateY(-1px);
  }
  .yt-icon {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    background: #ff0000;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: white;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .yt-arrow {
    margin-left: auto;
    font-size: 0.75rem;
    opacity: 0.6;
  }

  /* ── INGREDIENTS SECTION ────────────────────────────── */
  .ingr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  @media (max-width: 480px) { .ingr-grid { grid-template-columns: 1fr; } }

  .ingr-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: background 0.35s ease, border-color 0.35s ease;
  }
  .ingr-meal-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 10px 14px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    transition: color 0.35s ease, background 0.35s ease;
  }
  .ingr-list {
    padding: 10px 14px;
    list-style: none;
  }
  .ingr-list li {
    font-size: 0.82rem;
    color: var(--text-secondary);
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    gap: 6px;
    align-items: baseline;
  }
  .light-theme .ingr-list li { border-bottom-color: rgba(0,0,0,0.06); }
  .ingr-list li:last-child { border-bottom: none; }
  .ingr-list li::before { content: '•'; color: var(--accent); flex-shrink: 0; }

  .blinkit-link {
    flex-shrink: 0;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.2px;
    color: #7ebe4e;
    background: rgba(126, 190, 78, 0.1);
    border: 1px solid rgba(126, 190, 78, 0.28);
    border-radius: 4px;
    padding: 2px 6px;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .blinkit-link:hover {
    background: rgba(126, 190, 78, 0.22);
    color: #a0d870;
  }

  /* ── DAILY MACROS TABLE ─────────────────────────────── */
  .macro-table-wrap { overflow-x: auto; margin-top: 16px; border-radius: 10px; border: 1px solid var(--border); transition: border-color 0.35s ease; }
  .macro-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .macro-table th {
    background: var(--card2);
    padding: 12px 14px;
    text-align: left;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.5px;
    font-size: 0.75rem;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    transition: background 0.35s ease, color 0.35s ease;
  }
  .macro-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
    white-space: nowrap;
    transition: border-color 0.35s ease;
  }
  .macro-table tr:last-child td { border-bottom: none; }
  .macro-table tr:hover td { background: var(--accent-glow); }
  .macro-table .total-row td {
    font-weight: 700;
    color: var(--text);
    background: var(--accent-glow);
    border-top: 1px solid var(--accent);
  }
  .macro-table .meal-name { color: var(--text); font-weight: 500; }

  /* ── NOTICE ─────────────────────────────────────────── */
  .notice {
    background: rgba(90,154,74,0.10);
    border: 1px solid rgba(90,154,74,0.30);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.83rem;
    color: #a8d898;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  /* ── LIGHT THEME OVERRIDES ──────────────────────────── */
  .light-theme .how-to-make ol { color: #374151; }
  .light-theme .macro-table td { color: #374151; }
  .light-theme .ingr-list li { color: #4b5563; }
  .light-theme .notice { background: rgba(37,99,235,0.08); border-color: rgba(37,99,235,0.25); color: #1d4ed8; }
  .light-theme .blinkit-link { color: #16a34a; background: rgba(22,163,74,0.08); border-color: rgba(22,163,74,0.3); }
  .light-theme .blinkit-link:hover { background: rgba(22,163,74,0.15); color: #15803d; }
  .light-theme .macro-table tr:last-child td { border-bottom: none; }
  .light-theme .youtube-link { background: rgba(220,38,38,0.06); border-color: rgba(220,38,38,0.2); color: #dc2626; }
  .light-theme .youtube-link:hover { background: rgba(220,38,38,0.12); color: #b91c1c; }
  .light-theme .stat-pill .dot-fat { background: #ea580c; }

  /* ── RESPONSIVE ─────────────────────────────────────── */
  @media (max-width: 600px) {
    .macros-row { grid-template-columns: repeat(2, 1fr); }
    .meal-title { font-size: 0.95rem; }
    .theme-bar { top: 10px; right: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <!-- Theme Bar -->
  <div class="theme-bar" id="themeBar">
    <span class="theme-icon">🎨</span>
    <span class="theme-label">Themes</span>
    <div class="theme-swatches">
      <button class="theme-swatch swatch-bluepurple" onclick="setTheme('bluepurple')" title="Blue Purple"></button>
      <button class="theme-swatch swatch-orange"     onclick="setTheme('orange')"     title="Sunset Orange"></button>
      <button class="theme-swatch swatch-amber active-theme" id="sw-amber" onclick="setTheme('amber')" title="Amber (Default)"></button>
      <button class="theme-swatch swatch-dark"       onclick="setTheme('dark')"       title="Dark Cosmic"></button>
      <button class="theme-swatch swatch-white"      onclick="setTheme('white')"      title="Clean White"></button>
      <button class="theme-swatch swatch-bluemix"    onclick="setTheme('bluemix')"    title="Blue Mix"></button>
    </div>
  </div>

  <h1>My Diet Plan</h1>
  <p>Fat Loss · Muscle Retention · ~2350 kcal/day · 190–200g Protein</p>
</div>

<div class="stats-bar">
  <div class="stat-pill"><span class="dot dot-cal"></span> ~2350 kcal/day</div>
  <div class="stat-pill"><span class="dot dot-pro"></span> 190–200g Protein</div>
  <div class="stat-pill"><span class="dot dot-car"></span> ~250g Carbs</div>
  <div class="stat-pill"><span class="dot dot-fat"></span> ~80g Fat</div>
</div>

<div class="tabs-wrap" id="dayTabs">
  <button class="tab-btn active" onclick="selectDay(0)">Mon</button>
  <button class="tab-btn" onclick="selectDay(1)">Tue</button>
  <button class="tab-btn" onclick="selectDay(2)">Wed</button>
  <button class="tab-btn" onclick="selectDay(3)">Thu</button>
  <button class="tab-btn" onclick="selectDay(4)">Fri</button>
  <button class="tab-btn" onclick="selectDay(5)">Sat</button>
  <button class="tab-btn" onclick="selectDay(6)">Sun</button>
</div>

<div class="section-toggle">
  <button class="toggle-btn active" onclick="showSection('timetable')">📅 Timetable &amp; Recipes</button>
  <button class="toggle-btn" onclick="showSection('ingredients')">🛒 Ingredients Needed</button>
  <button class="toggle-btn" onclick="showSection('macros')">📊 Daily Macros</button>
</div>

<div class="main" id="mainContent"></div>

<script>

/* ════════════════════════════════════════════════
   MEAL DATA  (42 meals across 7 days)
   ════════════════════════════════════════════════ */
const days = [
  /* ─── MONDAY ─────────────────────────────────── */
  {
    name: "Monday",
    meals: [
      {
        time: "7:30 AM",
        label: "Meal 1 – Breakfast",
        dish: "Chicken Quesadilla",
        desc: "A crisp, golden wrap packed with juicy chicken, melted cheese, and fresh capsicum. Indian pantry-friendly and endlessly satisfying.",
        steps: [
          "Pat the chicken dry and season with salt, pepper, Kashmiri red chilli powder, and garlic powder.",
          "Cook the chicken in a lightly oiled pan until fully done, then slice into small strips.",
          "Warm the rotis/tortillas so they bend without cracking.",
          "Layer one roti with chicken, diced onion, capsicum, and grated cheese, then fold the second roti on top.",
          "Toast both sides on medium-low heat until golden and the cheese melts into every bite. Slice and serve with cool curd."
        ],
        ingredients: ["200g chicken breast", "2 whole wheat rotis or wraps", "30g cheese", "1 small onion", "1 capsicum", "50g curd", "Kashmiri red chilli powder", "Garlic powder", "Salt", "Pepper"],
        kcal: 430, protein: 38, carbs: 34, fat: 15,
        priceLow: 110, priceHigh: 150,
        youtube: "https://www.youtube.com/results?search_query=chicken+quesadilla+recipe+indian+style+hindi"
      },
      {
        time: "10:30 AM",
        label: "Meal 2 – Mid-Morning",
        dish: "Boiled Eggs + Roasted Chana",
        desc: "Simple, satisfying, and portable. Eggs handle the protein while roasted chana adds a satisfying crunch.",
        steps: [
          "Place eggs in a saucepan, cover with cold water, and bring to a boil.",
          "Cook for 8–9 minutes for firm yolks, then transfer to ice-cold water to stop cooking.",
          "Peel carefully and season with a pinch of salt and black pepper.",
          "Mix the roasted chana with chaat masala in a small bowl.",
          "Pack both together — a perfect portable protein snack."
        ],
        ingredients: ["4 whole eggs", "40g roasted chana", "Black pepper", "Chaat masala"],

let activeTheme = 'amber';

function setTheme(t) {
  const th = THEMES[t] || THEMES.amber;
  activeTheme = t;
  const r = document.documentElement;
  r.style.setProperty('--bg',          th.bg);
  r.style.setProperty('--card',        th.card);
  r.style.setProperty('--card2',       th.card2);
  r.style.setProperty('--accent',      th.accent);
  r.style.setProperty('--accent2',     th.accent2);
  r.style.setProperty('--text',        th.text);
  r.style.setProperty('--muted',       th.muted);
  r.style.setProperty('--border',      th.border);
  r.style.setProperty('--accent-glow', th.accentGlow);
  r.style.setProperty('--header-glow', th.headerGlow);
  r.style.setProperty('--hover-card',  th.hoverCard);
  r.style.setProperty('--text-secondary', th.textSec);
  r.style.setProperty('--text-tertiary',  th.textTer);

  document.querySelector('.header').style.background = th.headerBg;

  if (th.light) {
    document.body.classList.add('light-theme');
  } else {
    document.body.classList.remove('light-theme');
  }

  // Update active swatch indicator
  document.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('active-theme'));
  const swatchMap = {amber:'sw-amber', dark:'sw-dark', white:'sw-white', bluepurple:'sw-bluepurple', orange:'sw-orange', bluemix:'sw-bluemix'};
  if (swatchMap[t]) document.getElementById(swatchMap[t])?.classList.add('active-theme');

  try { localStorage.setItem('dietTheme', t); } catch(e) {}
}

// Restore saved theme on load
try {
  const saved = localStorage.getItem('dietTheme');
  if (saved && THEMES[saved]) setTheme(saved);
} catch(e) {}

/* ════════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════════ */
function renderContent() {
  const day = days[currentDay];
  const container = document.getElementById('mainContent');

  if (currentSection === 'timetable') {
    let html = `<div class="notice">💡 Aim for <strong>8,000–12,000 steps daily</strong>. Drink 3–4 litres of water. Train 3–4× per week — even 30 mins of lifting beats 1 hour of only cardio.</div>`;

    day.meals.forEach((meal, i) => {
      html += `
      <div class="meal-card" id="mc${i}">
        <div class="meal-header" onclick="toggleMeal(this)">
          <span class="meal-badge">${meal.time}</span>
          <span class="meal-title">${meal.dish}</span>
          <span class="meal-cals">${meal.kcal} kcal · ₹${meal.priceLow}–₹${meal.priceHigh}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="meal-body">
          <div class="meal-badge" style="display:inline-block;margin-bottom:10px;">${meal.label}</div>
          <p class="dish-desc">${meal.desc}</p>
          <div class="how-to-make">
            <h4>How to Make</h4>
            <ol>${meal.steps.map(s => `<li>${s}</li>`).join('')}</ol>
          </div>
          <div class="macros-row">
            <div class="macro-box"><div class="val cal-val">${meal.kcal}</div><div class="lbl">Calories</div></div>
            <div class="macro-box"><div class="val pro-val">${meal.protein}g</div><div class="lbl">Protein</div></div>
            <div class="macro-box"><div class="val car-val">${meal.carbs}g</div><div class="lbl">Carbs</div></div>
            <div class="macro-box"><div class="val fat-val">${meal.fat}g</div><div class="lbl">Fat</div></div>
          </div>
          <a href="${meal.youtube}" target="_blank" rel="noopener noreferrer" class="youtube-link">
            <span class="yt-icon">▶</span>
            Watch Tutorial on YouTube
            <span class="yt-arrow">↗</span>
          </a>
        </div>
      </div>`;
    });
    container.innerHTML = html;

  } else if (currentSection === 'ingredients') {
    let html = `<div class="notice">🛒 All ingredients you need for today. Click <strong>Blinkit ↗</strong> on any item to order it instantly.</div>`;
    html += `<div class="ingr-grid">`;
    day.meals.forEach(meal => {
      html += `
      <div class="ingr-card">
        <div class="ingr-meal-title">${meal.time} — ${meal.dish}</div>
        <div style="padding:8px 14px 0;font-size:0.78rem;color:var(--muted);">Approx. price: ₹${meal.priceLow}–₹${meal.priceHigh}</div>
        <ul class="ingr-list">
          ${meal.ingredients.map(ing => {
            const blinkitUrl = getBlinkitLink(ing);
            const blinkitBadge = blinkitUrl
              ? `<a href="${blinkitUrl}" target="_blank" rel="noopener noreferrer" class="blinkit-link">Blinkit ↗</a>`
              : '';
            return `<li>${ing} <span style="margin-left:auto;color:var(--accent);font-size:0.75rem;">${getIngredientPrice(ing)}</span>${blinkitBadge}</li>`;
          }).join('')}
        </ul>
      </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;

  } else {
    let totalKcal = 0, totalPro = 0, totalCarbs = 0, totalFat = 0, totalPriceLow = 0, totalPriceHigh = 0;
    let tableRows = day.meals.map(meal => {
      totalKcal += meal.kcal;
      totalPro += meal.protein;
      totalCarbs += meal.carbs;
      totalFat += meal.fat;
      totalPriceLow += meal.priceLow;
      totalPriceHigh += meal.priceHigh;
      return `<tr>
        <td class="meal-name">${meal.time}</td>
        <td>${meal.dish}</td>
        <td style="color:var(--accent);font-weight:600;">${meal.kcal}</td>
        <td style="color:var(--green);font-weight:600;">${meal.protein}g</td>
        <td style="color:var(--blue);font-weight:600;">${meal.carbs}g</td>
        <td style="color:#e67e22;font-weight:600;">${meal.fat}g</td>
        <td style="font-weight:600;color:var(--accent);">₹${meal.priceLow}–₹${meal.priceHigh}</td>
      </tr>`;
    }).join('');

    let html = `
    <div class="notice">📊 All macros for <strong>${day.name}</strong>. Target: ~2350 kcal, 190–200g protein, ~250g carbs, ~80g fat.</div>
    <div class="macro-table-wrap">
      <table class="macro-table">
        <thead>
          <tr>
            <th>Time</th><th>Dish</th><th>Kcal</th><th>Protein</th><th>Carbs</th><th>Fat</th><th>Price</th>
          </tr>
        </thead>
        <tbody>
          ${tableRows}
          <tr class="total-row">
            <td colspan="2">DAILY TOTAL</td>
            <td>${totalKcal}</td>
            <td>${totalPro}g</td>
            <td>${totalCarbs}g</td>
            <td>${totalFat}g</td>
            <td>₹${totalPriceLow}–₹${totalPriceHigh}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
    container.innerHTML = html;
  }
}

renderContent();
