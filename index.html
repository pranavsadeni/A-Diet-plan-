<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Diet Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c09;
    --card: #1a1712;
    --card2: #221f1a;
    --accent: #e8a838;
    --accent2: #d47c2a;
    --text: #f0e8d8;
    --muted: #8a7d68;
    --green: #5a9a4a;
    --red: #c0392b;
    --blue: #3498db;
    --border: #2e2a22;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #1a1209 0%, #2a1f0e 50%, #1a1209 100%);
    border-bottom: 2px solid var(--accent);
    padding: 28px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(232,168,56,0.12) 0%, transparent 70%);
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    color: var(--accent);
    letter-spacing: 1px;
    position: relative;
  }
  .header p {
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 6px;
    position: relative;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 14px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 0.82rem;
    font-weight: 500;
  }
  .stat-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-cal { background: var(--accent); }
  .dot-pro { background: var(--green); }
  .dot-car { background: var(--blue); }
  .dot-fat { background: #e67e22; }

  /* TABS */
  .tabs-wrap {
    display: flex;
    gap: 0;
    overflow-x: auto;
    background: var(--card);
    border-bottom: 2px solid var(--border);
    padding: 0 10px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex-shrink: 0;
    padding: 14px 16px;
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }
  .tab-btn:hover { color: var(--accent); }
  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* SECTION TOGGLE */
  .section-toggle {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .toggle-btn {
    padding: 8px 18px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .toggle-btn.active {
    background: var(--accent);
    color: #0e0c09;
    border-color: var(--accent);
  }

  /* MAIN CONTENT */
  .main { max-width: 900px; margin: 0 auto; padding: 16px; }

  /* SECTION */
  .section { display: none; animation: fadeIn 0.3s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* MEAL CARD */
  .meal-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .meal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    background: var(--card2);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .meal-header:hover { background: #2a2520; }
  .meal-badge {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(232,168,56,0.12);
    border: 1px solid rgba(232,168,56,0.25);
    padding: 3px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .meal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--text);
    flex: 1;
  }
  .meal-cals {
    font-size: 0.78rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .chevron {
    font-size: 0.75rem;
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .meal-card.open .chevron { transform: rotate(180deg); }

  .meal-body { display: none; padding: 18px; }
  .meal-card.open .meal-body { display: block; }

  .dish-desc {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 14px;
    font-style: italic;
  }

  .how-to-make {
    background: rgba(232,168,56,0.06);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin-bottom: 14px;
  }
  .how-to-make h4 {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .how-to-make ol {
    padding-left: 18px;
    font-size: 0.85rem;
    line-height: 1.8;
    color: #c8b898;
  }

  /* MACROS ROW */
  .macros-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .macro-box {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
  }
  .macro-box .val {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
  }
  .macro-box .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
  .cal-val { color: var(--accent); }
  .pro-val { color: var(--green); }
  .car-val { color: var(--blue); }
  .fat-val { color: #e67e22; }

  /* INGREDIENTS SECTION */
  .ingr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  @media (max-width: 480px) { .ingr-grid { grid-template-columns: 1fr; } }

  .ingr-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .ingr-meal-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 10px 14px;
    background: var(--card2);
    border-bottom: 1px solid var(--border);
  }
  .ingr-list {
    padding: 10px 14px;
    list-style: none;
  }
  .ingr-list li {
    font-size: 0.82rem;
    color: #c0b09a;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex;
    gap: 6px;
    align-items: baseline;
  }
  .ingr-list li:last-child { border-bottom: none; }
  .ingr-list li::before { content: 'вЂў'; color: var(--accent); flex-shrink: 0; }

  .blinkit-link {
    flex-shrink: 0;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.2px;
    color: #7ebe4e;
    background: rgba(126, 190, 78, 0.1);
    border: 1px solid rgba(126, 190, 78, 0.28);
    border-radius: 4px;
    padding: 2px 6px;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .blinkit-link:hover {
    background: rgba(126, 190, 78, 0.22);
    color: #a0d870;
  }

  /* DAILY MACROS TABLE */
  .macro-table-wrap { overflow-x: auto; margin-top: 16px; border-radius: 10px; border: 1px solid var(--border); }
  .macro-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }
  .macro-table th {
    background: var(--card2);
    padding: 12px 14px;
    text-align: left;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 0.5px;
    font-size: 0.75rem;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .macro-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: #c8b898;
    white-space: nowrap;
  }
  .macro-table tr:last-child td { border-bottom: none; }
  .macro-table tr:hover td { background: rgba(255,255,255,0.02); }
  .macro-table .total-row td {
    font-weight: 700;
    color: var(--text);
    background: rgba(232,168,56,0.08);
    border-top: 1px solid var(--accent);
  }
  .macro-table .meal-name { color: var(--text); font-weight: 500; }

  /* NOTICE */
  .notice {
    background: rgba(90,154,74,0.1);
    border: 1px solid rgba(90,154,74,0.3);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.83rem;
    color: #a8d898;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .macros-row { grid-template-columns: repeat(2, 1fr); }
    .meal-title { font-size: 0.95rem; }
  }
</style>
</head>

let currentDay = 0;
let currentSection = 'timetable';

function selectDay(idx) {
  currentDay = idx;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  renderContent();
}

function showSection(sec) {
  currentSection = sec;
  document.querySelectorAll('.toggle-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes("'"+sec+"'"));
  });
  renderContent();
}

function toggleMeal(el) {
  el.closest('.meal-card').classList.toggle('open');
}

function renderContent() {
  const day = days[currentDay];
  const container = document.getElementById('mainContent');

  if (currentSection === 'timetable') {
    let html = `<div class="notice">рџ’Ў Aim for <strong>8,000вЂ“12,000 steps daily</strong>. Drink 3вЂ“4 litres of water. Train 3вЂ“4x per week вЂ” even 30 mins of lifting beats 1 hour of only cardio.</div>`;
    day.meals.forEach((meal, i) => {
      html += `
      <div class="meal-card" id="mc${i}">
        <div class="meal-header" onclick="toggleMeal(this)">
          <span class="meal-badge">${meal.time}</span>
          <span class="meal-title">${meal.dish}</span>
          <span class="meal-cals">${meal.kcal} kcal В· в‚№${meal.priceLow}вЂ“в‚№${meal.priceHigh}</span>
          <span class="chevron">в–ј</span>
        </div>
        <div class="meal-body">
          <div class="meal-badge" style="display:inline-block;margin-bottom:10px;">${meal.label}</div>
          <p class="dish-desc">${meal.desc}</p>
          <div class="how-to-make">
            <h4>How to Make</h4>
            <ol>${meal.steps.map(s => `<li>${s}</li>`).join('')}</ol>
          </div>
          <div class="macros-row">
            <div class="macro-box"><div class="val cal-val">${meal.kcal}</div><div class="lbl">Calories</div></div>
            <div class="macro-box"><div class="val pro-val">${meal.protein}g</div><div class="lbl">Protein</div></div>
            <div class="macro-box"><div class="val car-val">${meal.carbs}g</div><div class="lbl">Carbs</div></div>
            <div class="macro-box"><div class="val fat-val">${meal.fat}g</div><div class="lbl">Fat</div></div>
          </div>
        </div>
      </div>`;
    });
    container.innerHTML = html;

  } else if (currentSection === 'ingredients') {
    let html = `<div class="notice">рџ›’ Below are all ingredients you'll need for each meal today. Click <strong>Blinkit в†—</strong> on any item to order it instantly. Shop the full list at the start of the day or week.</div>`;
    html += `<div class="ingr-grid">`;
    day.meals.forEach(meal => {
      html += `
      <div class="ingr-card">
        <div class="ingr-meal-title">${meal.time} вЂ” ${meal.dish}</div>
          <div style="padding:8px 14px 0;font-size:0.78rem;color:var(--muted);">Approx. price: в‚№${meal.priceLow}вЂ“в‚№${meal.priceHigh}</div>
        <ul class="ingr-list">
          ${meal.ingredients.map(ing => {
            const blinkitUrl = getBlinkitLink(ing);
            const blinkitBadge = blinkitUrl
              ? `<a href="${blinkitUrl}" target="_blank" rel="noopener noreferrer" class="blinkit-link">Blinkit в†—</a>`
              : '';
            return `<li>${ing} <span style="margin-left:auto;color:var(--accent);font-size:0.75rem;">${getIngredientPrice(ing)}</span>${blinkitBadge}</li>`;
          }).join('')}
        </ul>
      </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;

  } else {
    // MACROS TABLE
    let totalKcal = 0, totalPro = 0, totalCarbs = 0, totalFat = 0, totalPriceLow = 0, totalPriceHigh = 0;
    let tableRows = day.meals.map(meal => {
      totalKcal += meal.kcal;
      totalPro += meal.protein;
      totalCarbs += meal.carbs;
      totalFat += meal.fat;
      totalPriceLow += meal.priceLow;
      totalPriceHigh += meal.priceHigh;
      return `<tr>
        <td class="meal-name">${meal.time}</td>
        <td>${meal.dish}</td>
        <td style="color:var(--accent);font-weight:600;">${meal.kcal}</td>
        <td style="color:var(--green);font-weight:600;">${meal.protein}g</td>
        <td style="color:var(--blue);font-weight:600;">${meal.carbs}g</td>
        <td style="color:#e67e22;font-weight:600;">${meal.fat}g</td>
        <td style="font-weight:600;color:var(--accent);">в‚№${meal.priceLow}вЂ“в‚№${meal.priceHigh}</td>
      </tr>`;
    }).join('');

    let html = `
    <div class="notice">рџ“Љ All macros for <strong>${day.name}</strong>. Target: ~2100 kcal, 190вЂ“200g protein, ~190вЂ“210g carbs, ~70вЂ“80g fat.</div>

            <td>в‚№${totalPriceLow}вЂ“в‚№${totalPriceHigh}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
    container.innerHTML = html;
  }
}
